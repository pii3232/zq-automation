name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
          libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good cython3 autoconf libtool \
          pkg-config libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev automake zip unzip openjdk-17-jdk
    
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer kivy opencv-python-headless numpy pyjnius requests pillow cython
    
    - name: Accept Android SDK licenses
      run: |
        mkdir -p ~/.buildozer/android/platform/android-sdk/cmdline-tools
        yes | sdkmanager --licenses || true
    
    - name: Build APK
      working-directory: android
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zq-automation-apk
        path: android/bin/*.apk
        retention-days: 30
