name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install Java 8 for SDK tools
      run: |
        sudo apt-get update
        sudo apt-get install -y openjdk-8-jdk openjdk-17-jdk
    
    - name: Install system dependencies
      run: |
        sudo apt-get install -y \
          build-essential git ffmpeg libsdl2-dev libsdl2-image-dev \
          libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev \
          libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev \
          libgstreamer1.0-dev gstreamer1.0-plugins-base \
          gstreamer1.0-plugins-good autoconf libtool \
          pkg-config libncurses5-dev libncursesw5-dev cmake \
          libffi-dev libssl-dev automake zip unzip wget
    
    - name: Install Buildozer
      run: |
        python -m pip install --upgrade pip setuptools wheel
        pip install buildozer kivy opencv-python-headless numpy pyjnius requests pillow cython
    
    - name: Pre-setup Android SDK tools (legacy)
      run: |
        # Create buildozer expected directory structure
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk
        
        # Download SDK Tools (legacy version that buildozer expects)
        cd /tmp
        wget -q https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip -O sdk-tools.zip
        unzip -q sdk-tools.zip -d /home/runner/.buildozer/android/platform/android-sdk
        
        # Accept licenses
        mkdir -p /home/runner/.buildozer/android/platform/android-sdk/licenses
        echo -e "\n24333f8a63b92e6393f988463d38373f9819b9a7" > /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\n84831b9409646a948e89b2d2e4d5c849a0f9a6b6" >> /home/runner/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        echo -e "\nd975f75a33e5f8a2b2e8c6ae0fe7ee0df5b9440a" > /home/runner/.buildozer/android/platform/android-sdk/licenses/intel-android-extra-license
        
        # Install required SDK components (using Java 8)
        export JAVA_HOME=/usr/lib/jvm/java-8-openjdk-amd64
        yes | /home/runner/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "platform-tools" "build-tools;33.0.2" "platforms;android-31"
    
    - name: Build APK
      working-directory: android
      env:
        JAVA_HOME: /usr/lib/jvm/java-8-openjdk-amd64
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zq-automation-apk
        path: android/bin/*.apk
        retention-days: 30
